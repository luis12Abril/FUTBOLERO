    function previewDataImagen() {
        //PERMITE LEER CUALQUIER ARCHIVO
        var reader = new FileReader();

        // ESTO ES PARA COMENZAR A LEER, ES UN METODO ASINCRONO
        reader.readAsDataURL(document.getElementById("idInputFoto").files[0]);

        // CUANDO TERMINE DE CARGAR VA HA PINTAR LA IMAGEN
        reader.onloadend = function () {
            document.getElementById("idImgFoto").src = reader.result;

    function ConfirmarBorrar(titulo, mensaje, Tipo) {
        return new Promise((resolve) => {
            Swal.fire({
                title: titulo,
                text: mensaje,
                icon: Tipo,
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Confirmar'
            }).then((result) => {
                if (result.value) {
                    resolve(true);
                } else {
                    resolve(false);
                }
            });
        });
    }

    function focusById(elementoId) {
